<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{{title}}</title>
        <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4/dist/panzoom.min.js"></script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap");

            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }

            :root {
                --bg: #0d1117;
                --surface: #161b22;
                --border: #21262d;
                --border-hi: #30363d;
                --text-hi: #e6edf3;
                --text-md: #c9d1d9;
                --text-lo: #8b949e;
                --text-dim: #484f58;
                --accent: #58a6ff;
                --green: #3fb950;
                --orange: #d29922;
                --mono: "JetBrains Mono", "SF Mono", "Fira Code", monospace;
            }

            body {
                margin: 0;
                font-family: var(--mono);
                background: var(--bg);
                color: var(--text-hi);
                display: flex;
                flex-direction: column;
                height: 100vh;
                overflow: hidden;
            }

            header {
                flex-shrink: 0;
                height: 44px;
                padding: 0 20px;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                gap: 0;
            }

            .logo {
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 0.15em;
                color: var(--accent);
                text-transform: uppercase;
                padding-right: 12px;
                border-right: 1px solid var(--border-hi);
                margin-right: 12px;
            }

            .breadcrumb {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 12px;
            }

            .breadcrumb-item {
                color: var(--text-md);
                font-weight: 600;
            }

            .breadcrumb-sep {
                color: var(--border-hi);
                font-size: 14px;
            }

            .breadcrumb-sub {
                color: var(--text-lo);
                font-weight: 400;
            }

            .header-right {
                margin-left: auto;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .badge {
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                padding: 2px 8px;
                border-radius: 3px;
                border: 1px solid var(--border-hi);
                color: var(--text-lo);
            }

            .badge-blue {
                border-color: var(--accent);
                color: var(--accent);
                background: rgba(31, 111, 235, 0.13);
            }

            .badge-green {
                border-color: var(--green);
                color: var(--green);
                background: rgba(63, 185, 80, 0.07);
            }

            main {
                flex: 1;
                overflow: hidden;
                position: relative;
                background: var(--bg);
            }

            .graph-container {
                width: 100%;
                height: 100%;
                overflow: hidden;
                cursor: grab;
                position: relative;
            }

            .graph-container:active {
                cursor: grabbing;
            }

            .graph-inner {
                /*padding: 32px;
                display: inline-block;
                min-width: max-content;*/
                width: 100%;
                height: 100%;
                overflow: visible;
                position: relative;
            }

            #panzoom-target {
                width: 4000px;
                height: 4000px;
                transform-origin: 0 0;
                position: relative;
                overflow: visible;
            }

            .mermaid {
                display: inline-block;
                min-width: max-content;
                position: absolute;
                left: 1200px;
                top: 1200px;
            }

            .mermaid svg {
                max-width: none !important;
                width: auto !important;
                height: auto !important;
                background: transparent !important;
            }

            .mermaid rect {
                stroke-width: 1.5px;
            }

            footer {
                flex-shrink: 0;
                padding: 8px 20px;
                background: var(--surface);
                border-top: 1px solid var(--border-hi);
                font-size: 12px;
                color: var(--text-lo);
                display: flex;
                align-items: center;
                gap: 16px;
            }

            .footer-stat {
                display: flex;
                align-items: center;
                gap: 5px;
            }

            .footer-stat-value {
                color: var(--text-md);
                font-weight: 600;
            }

            .footer-hint {
                margin-left: auto;
                color: var(--text-lo);
            }

            .zoom-controls {
                position: absolute;
                bottom: 16px;
                right: 20px;
                display: flex;
                flex-direction: column;
                gap: 4px;
                z-index: 10;
            }

            .zoom-btn {
                width: 32px;
                height: 32px;
                background: var(--surface);
                border: 1px solid var(--border-hi);
                border-radius: 6px;
                color: var(--text-lo);
                font-size: 16px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    background 0.15s,
                    color 0.15s;
                user-select: none;
            }

            .zoom-btn:hover {
                background: var(--border);
                color: var(--text-hi);
            }
        </style>
    </head>
    <body>
        <header>
            <span class="logo">codemarp</span>
            <div class="breadcrumb">
                <span class="breadcrumb-item">{{title}}</span>
                <span class="breadcrumb-sep">·</span>
                <span class="breadcrumb-sub">{{subtitle}}</span>
            </div>
            <div class="header-right">
                <span class="badge badge-blue">mermaid</span>
                <span class="badge badge-green">{{mode}}</span>
            </div>
        </header>

        <main>
            <div class="graph-container" id="graph-container">
                <div class="graph-inner">
                    <div id="panzoom-target">
                        <div class="mermaid" id="mermaid-graph">
                            {{mermaid}}
                        </div>
                    </div>
                </div>
            </div>

            <div class="zoom-controls">
                <button class="zoom-btn" id="zoom-in" title="Zoom in">+</button>
                <button
                    class="zoom-btn"
                    id="zoom-reset"
                    title="Reset zoom"
                    style="font-size: 11px"
                >
                    1:1
                </button>
                <button class="zoom-btn" id="zoom-out" title="Zoom out">
                    −
                </button>
            </div>
        </main>

        <footer>
            <span class="footer-stat">
                <span>mode</span>
                <span class="footer-stat-value">{{mode}}</span>
            </span>
            <span class="footer-stat">
                <span>lang</span>
                <span class="footer-stat-value">{{language}}</span>
            </span>
            <span class="footer-stat">
                <span>nodes</span>
                <span class="footer-stat-value">{{node_count}}</span>
            </span>
            <span class="footer-stat">
                <span>edges</span>
                <span class="footer-stat-value">{{edge_count}}</span>
            </span>
            <span class="footer-hint">scroll to zoom · drag to pan</span>
        </footer>

        <script>
            mermaid.initialize({
                startOnLoad: true,
                theme: "dark",
                maxTextSize: 1000000,
                flowchart: {
                    useMaxWidth: false,
                    nodeSpacing: 40,
                    rankSpacing: 60,
                },
                themeVariables: {
                    fontSize: "13px",
                    darkMode: true,
                    background: "#0d1117",
                    mainBkg: "#161b22",
                    nodeBorder: "#30363d",
                    clusterBkg: "#161b22",
                    titleColor: "#e6edf3",
                    edgeLabelBackground: "#0d1117",
                    lineColor: "#58a6ff",
                },
            });

            window.addEventListener("load", () => {
                setTimeout(() => {
                    const target = document.getElementById("panzoom-target");
                    const container =
                        document.getElementById("graph-container");
                    const mermaidGraph =
                        document.getElementById("mermaid-graph");

                    if (!target || !container || !mermaidGraph) return;

                    const pz = Panzoom(target, {
                        maxScale: 8,
                        minScale: 0.05,
                        step: 0.15,
                    });

                    function computeInitialPan() {
                        const containerRect = container.getBoundingClientRect();
                        const svg = mermaidGraph.querySelector("svg");
                        if (!svg) return { x: 0, y: 0 };

                        const graphBox = svg.getBBox();

                        const graphLeft = mermaidGraph.offsetLeft + graphBox.x;
                        const graphTop = mermaidGraph.offsetTop + graphBox.y;

                        return {
                            x:
                                containerRect.width / 2 -
                                graphLeft -
                                graphBox.width / 2,
                            y:
                                containerRect.height / 2 -
                                graphTop -
                                graphBox.height / 2,
                        };
                    }

                    const initialScale = 1;
                    let initialPan = { x: 0, y: 0 };

                    function resetView() {
                        pz.zoom(initialScale, { animate: false });
                        pz.pan(initialPan.x, initialPan.y, { animate: false });
                    }

                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            initialPan = computeInitialPan();
                            resetView();
                        });
                    });

                    container.addEventListener(
                        "wheel",
                        (e) => {
                            pz.zoomWithWheel(e);
                            e.preventDefault();
                        },
                        { passive: false },
                    );

                    document
                        .getElementById("zoom-in")
                        .addEventListener("click", () => pz.zoomIn());

                    document
                        .getElementById("zoom-out")
                        .addEventListener("click", () => pz.zoomOut());

                    document
                        .getElementById("zoom-reset")
                        .addEventListener("click", resetView);
                }, 100);
            });
        </script>
    </body>
</html>
